<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily ULD Checklist App</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts for Report -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Dexie.js (Database) -->
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>

    <!-- html2canvas for HD JPG Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* Essential Print Styles & Formatting */
        @media print {
            @page { size: A4 portrait; margin: 0; }
            body { background-color: #e0f2fe !important; font-size: 12px; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .print-hidden { display: none !important; }
            .print-no-shadow { box-shadow: none !important; border: none !important; }
            #capture-report { width: 100% !important; min-height: auto !important; padding: 20px !important; margin: 0 !important; background-color: #e0f2fe !important; }
        }
        
        /* Typography overrides for the final report */
        .font-report { font-family: 'Roboto Condensed', sans-serif; font-weight: 700 !important; }
        .font-oswald { font-family: 'Oswald', sans-serif; font-weight: 700 !important; }

        /* Force Everything to Uppercase and Bold as requested */
        body, input, textarea, button, select { 
            text-transform: uppercase !important; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* Ensure all text inside report is bold */
        #capture-report * {
            font-weight: 700 !important;
        }

        /* Splash & Popup Animation */
        .animate-splash {
            animation: popIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Custom Scrollbar for Report View on Mobile */
        .report-scroll::-webkit-scrollbar { height: 6px; }
        .report-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // 1. DATABASE
        // ==========================================
        const db = new Dexie('USBA_ULD_DB_V2');
        db.version(1).stores({ flights: '++id, flightNo, station, date' });

        // ==========================================
        // 2. ICON SYSTEM
        // ==========================================
        const Icon = ({ name, size = 20, className = "", color="currentColor" }) => {
            const paths = {
                user: "M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2 M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z",
                idCard: "M3 5h18a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z M8 10h.01 M12 10h4 M12 14h4",
                calendar: "M21 10H3 M16 2v4 M8 2v4 M5 6h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z",
                file: "M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6",
                cube: "M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z M3.27 6.96L12 12.01l8.73-5.05 M12 22.08V12",
                checkCircle: "M22 11.08V12a10 10 0 1 1-5.93-9.14 M22 4L12 14.01l-3-3",
                alertTriangle: "M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z M12 9v4 M12 17h.01",
                wrench: "M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z",
                plane: "M2 22h20 M12 9l-4-4-2.5 2.5a2.828 2.828 0 0 0 0 4l3.5 3.5 9-9c2.5-2.5 6.5-1.5 6.5-1.5s1 4-1.5 6.5l-9 9",
                plus: "M12 5v14 M5 12h14",
                print: "M6 9V2h12v7 M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2 M6 14h12v8H6z",
                trash: "M3 6h18 M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2 M10 11v6 M14 11v6",
                edit: "M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7 M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z",
                arrowLeft: "M19 12H5 M12 19l-7-7 7-7",
                info: "M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z M12 16v-4 M12 8h.01",
                logOut: "M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4 M16 17l5-5-5-5 M21 12H9",
                download: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M7 10l5 5 5-5 M12 15V3"
            };
            
            if (name === 'checkCircleSolid') {
                return (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill={color} className={className}>
                        <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm-1.8 14L6 11.8l1.3-1.4 2.9 3 6.6-6.6 1.4 1.4-8 8Z" />
                    </svg>
                )
            }
            if (name === 'alertTriangleSolid') {
                return (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill={color} className={className}>
                        <path d="M12.866 3l9.526 16.5a1 1 0 0 1-.866 1.5H2.474a1 1 0 0 1-.866-1.5L11.134 3a1 1 0 0 1 1.732 0zM11 16v2h2v-2h-2zm0-7v5h2V9h-2z" />
                    </svg>
                )
            }

            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} 
                     strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d={paths[name] || ""} />
                </svg>
            );
        };

        // ==========================================
        // 3. MAIN APP ROUTER
        // ==========================================
        function App() {
            const [view, setView] = useState('splash');
            const [user, setUser] = useState({ name: '', id: '' });
            const [flights, setFlights] = useState([]);
            const [editingFlight, setEditingFlight] = useState(null);
            
            const [globalData, setGlobalData] = useState({
                dacAke: localStorage.getItem('dacAke') || '',
                dacPmc: localStorage.getItem('dacPmc') || '',
                maintenance: localStorage.getItem('maintenance') || '',
                globalNotes: localStorage.getItem('globalNotes') || ''
            });

            const loadFlights = async () => { setFlights(await db.flights.toArray()); };

            useEffect(() => {
                loadFlights();
                const savedUser = localStorage.getItem('usbaUser');
                if (savedUser) setUser(JSON.parse(savedUser));

                if (view === 'splash') {
                    setTimeout(() => { setView(savedUser ? 'dashboard' : 'login'); }, 2000);
                }
            }, [view]);

            useEffect(() => {
                localStorage.setItem('dacAke', globalData.dacAke);
                localStorage.setItem('dacPmc', globalData.dacPmc);
                localStorage.setItem('maintenance', globalData.maintenance);
                localStorage.setItem('globalNotes', globalData.globalNotes);
            }, [globalData]);

            const handleLogout = async () => {
                if(window.confirm("WARNING: THIS WILL ERASE ALL SAVED FLIGHT DATA. CONTINUE?")) {
                    await db.flights.clear();
                    localStorage.clear();
                    setUser({name:'', id:''});
                    setGlobalData({dacAke:'', dacPmc:'', maintenance:'', globalNotes:''});
                    setFlights([]);
                    setView('login');
                }
            };

            if (view === 'splash') return <SplashScreen />;
            if (view === 'login') return <LoginView setUser={setUser} setView={setView} />;

            return (
                <div className="min-h-screen pb-24 print-hidden:pb-0 font-bold">
                    <header className="bg-[#1e3a8a] text-white p-4 shadow-md sticky top-0 z-10 print-hidden">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <Icon name="plane" size={24} />
                                <h1 className="text-xl font-bold tracking-wide">USBA ULD OPS</h1>
                            </div>
                            <div className="flex gap-2">
                                {view !== 'dashboard' && (
                                    <button onClick={() => { setView('dashboard'); setEditingFlight(null); }} className="px-3 py-2 bg-blue-800 hover:bg-blue-700 rounded-lg flex items-center gap-2 font-bold text-sm shadow-sm transition-colors">
                                        <Icon name="arrowLeft" size={16} /> BACK
                                    </button>
                                )}
                                <button onClick={handleLogout} className="px-3 py-2 bg-red-600 hover:bg-red-700 rounded-lg flex items-center gap-2 font-bold text-sm shadow-sm transition-colors">
                                    <Icon name="logOut" size={16} /> LOG OUT
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 print:p-0">
                        {view === 'dashboard' && <Dashboard flights={flights} setView={setView} setEditingFlight={setEditingFlight} reload={loadFlights} globalData={globalData} setGlobalData={setGlobalData} />}
                        {view === 'form' && <FlightForm setView={setView} editingFlight={editingFlight} reload={loadFlights} />}
                        {view === 'report' && <ReportView flights={flights} user={user} globalData={globalData} />}
                    </main>
                </div>
            );
        }

        // ==========================================
        // 4. SPLASH & LOGIN VIEWS
        // ==========================================
        function SplashScreen() {
            return (
                <div className="h-screen w-full flex items-center justify-center bg-[#1e3a8a] text-white overflow-hidden">
                    <h1 className="text-4xl md:text-5xl font-black tracking-widest text-center animate-splash leading-tight">
                        WELCOME TO<br/>RADOAN'S APP
                    </h1>
                </div>
            );
        }

        function LoginView({ setUser, setView }) {
            const [name, setName] = useState('');
            const [idNo, setIdNo] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                if(!name || !idNo) return alert("PLEASE FILL BOTH FIELDS");
                const userData = { name: name.toUpperCase(), id: idNo.toUpperCase() };
                localStorage.setItem('usbaUser', JSON.stringify(userData));
                setUser(userData);
                setView('dashboard');
            };

            return (
                <div className="h-screen flex items-center justify-center bg-gray-100 p-4">
                    <form onSubmit={handleLogin} className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-t-4 border-[#1e3a8a]">
                        <h2 className="text-2xl font-black text-[#1e3a8a] mb-6 text-center">LOGIN TO ULD OPS</h2>
                        <div className="space-y-4 mb-6">
                            <div>
                                <label className="block text-sm font-black text-gray-600 mb-1">USER NAME</label>
                                <input type="text" value={name} onChange={e => setName(e.target.value)} required placeholder="E.G. SPONDON"
                                    className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl font-bold text-lg outline-none focus:border-[#1e3a8a]" />
                            </div>
                            <div>
                                <label className="block text-sm font-black text-gray-600 mb-1">USBA ID NO</label>
                                <input type="text" value={idNo} onChange={e => setIdNo(e.target.value)} required placeholder="E.G. USBA-2607M"
                                    className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl font-bold text-lg outline-none focus:border-[#1e3a8a]" />
                            </div>
                        </div>
                        <button type="submit" className="w-full bg-[#1e3a8a] text-white py-4 rounded-xl font-black text-lg shadow-md hover:bg-blue-800 transition">
                            LOG IN
                        </button>
                    </form>
                </div>
            );
        }

        // ==========================================
        // 5. DASHBOARD 
        // ==========================================
        function Dashboard({ flights, setView, setEditingFlight, reload, globalData, setGlobalData }) {
            const [alertMsg, setAlertMsg] = useState('');

            const deleteFlight = async (id) => {
                if (window.confirm("DELETE THIS FLIGHT RECORD?")) { await db.flights.delete(id); reload(); }
            };

            const setVal = (k, v) => setGlobalData(p => ({...p, [k]: v}));

            const handleGenerateReport = () => {
                if(flights.length === 0) return alert("NO FLIGHTS ADDED YET.");
                if (globalData.dacAke === '') return setAlertMsg("DAC STOCK (AKE)");
                if (globalData.dacPmc === '') return setAlertMsg("DAC STOCK (PMC)");
                if (globalData.maintenance === '') return setAlertMsg("UNDER MAINTENANCE");
                setView('report');
            };

            return (
                <div className="space-y-6 relative">
                    
                    {alertMsg && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 px-4">
                            <div className="bg-white p-8 rounded-2xl shadow-2xl text-center animate-splash border-t-8 border-red-500 w-full max-w-sm">
                                <h2 className="text-2xl font-black text-red-600 mb-2">⚠️ ATTENTION</h2>
                                <p className="text-lg font-black text-[#1e3a8a]">CONTROLLER, PLEASE INPUT</p>
                                <p className="text-2xl font-black text-red-500 mt-2">[{alertMsg}]</p>
                                <button onClick={() => setAlertMsg('')} className="mt-8 w-full bg-[#1e3a8a] text-white py-3 rounded-xl font-black text-lg shadow-md hover:bg-blue-800 transition">OK</button>
                            </div>
                        </div>
                    )}

                    <h2 className="text-xl font-black text-[#1e3a8a] border-b pb-2">RECORDED FLIGHTS TODAY</h2>
                    {flights.length === 0 ? (
                        <div className="text-center p-8 bg-white rounded-xl text-gray-500 border border-dashed border-gray-300 font-bold">NO FLIGHTS RECORDED.</div>
                    ) : (
                        flights.map(f => {
                            const uldCount = (parseInt(f.totalAke)||0) + (parseInt(f.totalPmc)||0);
                            const dmg = (parseInt(f.damagedMajor)||0) + (parseInt(f.damagedMinor)||0);
                            const ok = uldCount - dmg;
                            return (
                                <div key={f.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center">
                                    <div>
                                        <h3 className="font-black text-lg">{f.station} <span className="text-gray-500 text-sm font-bold">({f.flightNo})</span></h3>
                                        <p className="text-xs text-gray-500 mt-1 font-bold">TOTAL ULD: {uldCount} | OK: {ok} | DMG: {dmg}</p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => { setEditingFlight(f); setView('form'); }} className="p-2 text-blue-600 bg-blue-50 rounded-lg"><Icon name="edit" size={18} /></button>
                                        <button onClick={() => deleteFlight(f.id)} className="p-2 text-red-600 bg-red-50 rounded-lg"><Icon name="trash" size={18} /></button>
                                    </div>
                                </div>
                            )
                        })
                    )}

                    <div className="bg-white p-5 rounded-xl shadow-md border-2 border-blue-100 space-y-4">
                        <div className="flex items-center gap-2 mb-2 border-b pb-2">
                            <Icon name="alertTriangle" color="#eab308" />
                            <h3 className="font-black text-[#1e3a8a]">MANDATORY SUMMARY FIELDS</h3>
                        </div>
                        <div>
                            <label className="text-xs font-black text-blue-600 mb-1 block">DAC STOCK</label>
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-xs font-black text-gray-500">AKE</label><input type="number" min="0" value={globalData.dacAke} onChange={e=>setVal('dacAke', e.target.value)} className="w-full p-2 border border-gray-300 rounded font-black text-lg bg-gray-50 focus:border-blue-500 outline-none" /></div>
                                <div><label className="text-xs font-black text-gray-500">PMC</label><input type="number" min="0" value={globalData.dacPmc} onChange={e=>setVal('dacPmc', e.target.value)} className="w-full p-2 border border-gray-300 rounded font-black text-lg bg-gray-50 focus:border-blue-500 outline-none" /></div>
                            </div>
                        </div>
                        <div>
                            <label className="text-xs font-black text-blue-600 block">UNDER MAINTENANCE</label>
                            <input type="number" min="0" value={globalData.maintenance} onChange={e=>setVal('maintenance', e.target.value)} className="w-full p-2 border border-gray-300 rounded font-black text-lg bg-gray-50 mt-1 focus:border-blue-500 outline-none" />
                        </div>
                        <div className="mt-4 border-t pt-4">
                            <label className="text-xs font-black text-gray-500 block">SPECIAL NOTES (OPTIONAL)</label>
                            <textarea value={globalData.globalNotes} onChange={e=>setVal('globalNotes', e.target.value)} className="w-full p-2 border border-gray-300 rounded font-bold uppercase bg-gray-50 mt-1 focus:border-blue-500 outline-none h-20" placeholder="ENTER ANY OVERALL REMARKS HERE..."></textarea>
                        </div>
                    </div>

                    <div className="fixed bottom-0 left-0 right-0 p-4 bg-white border-t flex justify-center gap-4 px-4 print-hidden z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                        <button onClick={() => setView('form')} className="flex-1 max-w-xs bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl shadow-lg font-black flex items-center justify-center gap-2 transition">
                            <Icon name="plus" size={20} /> ADD FLIGHT
                        </button>
                        <button onClick={handleGenerateReport} className="flex-1 max-w-xs bg-green-600 hover:bg-green-700 text-white py-4 rounded-xl shadow-lg font-black flex items-center justify-center gap-2 transition">
                            <Icon name="file" size={20} /> FINAL REPORT
                        </button>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 6. DATA ENTRY FORM 
        // ==========================================
        const oddStationMap = {
            341:'DXB', 343:'DXB', 345:'SHJ', 347:'SHJ', 349:'AUH', 351:'AUH',
            381:'RUH', 383:'RUH', 361:'JED', 363:'JED', 337:'MLE', 339:'MLE',
            217:'BKK', 219:'BKK', 321:'MCT', 323:'MCT', 333:'DOH', 335:'DOH',
            201:'CCU', 203:'CCU', 205:'MAA', 207:'MAA', 209:'MAA',
            325:'CAN', 327:'CAN', 307:'SIN', 309:'SIN', 315:'KUL', 317:'KUL', 319:'KUL'
        };
        const getStation = (flightStr) => {
            const match = flightStr.match(/\d+/);
            if (!match) return '';
            const num = parseInt(match[0], 10);
            if (oddStationMap[num]) return oddStationMap[num];
            if (num % 2 === 0 && oddStationMap[num - 1]) return oddStationMap[num - 1]; 
            return '';
        };

        function FlightForm({ setView, editingFlight, reload }) {
            const [formData, setFormData] = useState(editingFlight || {
                date: new Date().toISOString().slice(0, 10),
                flightNo: 'BS-', station: '', 
                totalAke: '', totalPmc: '', damagedMajor: '', damagedMinor: '',
                checklists: { lir: true, cpm: true, dmgRpt: true, maintRpt: true, sysUpdate: true, physical: true },
                notes: ''
            });

            const [alertMsg, setAlertMsg] = useState('');

            const handleFlight = (val) => {
                const upVal = val.toUpperCase();
                let autoStation = formData.station;
                const mapped = getStation(upVal);
                if(mapped) autoStation = mapped;
                setFormData({...formData, flightNo: upVal, station: autoStation});
            };

            const toggle = (k) => setFormData(p => ({...p, checklists: {...p.checklists, [k]: !p.checklists[k]}}));
            const setVal = (k, v) => setFormData(p => ({...p, [k]: v}));

            const save = async () => {
                if (!formData.date) return setAlertMsg("DATE");
                if (!formData.flightNo || formData.flightNo === 'BS-') return setAlertMsg("FLIGHT NO");
                if (!formData.station) return setAlertMsg("STATION");
                if (formData.totalAke === '') return setAlertMsg("TOTAL ULD (AKE)");
                if (formData.totalPmc === '') return setAlertMsg("TOTAL ULD (PMC)");
                if (formData.damagedMajor === '') return setAlertMsg("DAMAGED MAJOR");
                if (formData.damagedMinor === '') return setAlertMsg("DAMAGED MINOR");

                try {
                    if (formData.id) await db.flights.put(formData);
                    else await db.flights.add(formData);
                    reload(); setView('dashboard');
                } catch (e) { alert("ERROR SAVING"); }
            };

            return (
                <div className="space-y-4 pb-24 relative">
                    {alertMsg && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 px-4">
                            <div className="bg-white p-8 rounded-2xl shadow-2xl text-center animate-splash border-t-8 border-red-500 w-full max-w-sm">
                                <h2 className="text-2xl font-black text-red-600 mb-2">⚠️ ATTENTION</h2>
                                <p className="text-lg font-black text-[#1e3a8a]">CONTROLLER, PLEASE INPUT</p>
                                <p className="text-2xl font-black text-red-500 mt-2">[{alertMsg}]</p>
                                <button onClick={() => setAlertMsg('')} className="mt-8 w-full bg-[#1e3a8a] text-white py-3 rounded-xl font-black text-lg shadow-md hover:bg-blue-800 transition">OK</button>
                            </div>
                        </div>
                    )}

                    <div className="bg-white p-4 rounded-xl shadow border grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label className="text-xs font-black text-gray-500">DATE</label>
                            <input type="date" value={formData.date} onChange={e=>setVal('date', e.target.value)} className="w-full p-2 border rounded font-black uppercase"/>
                        </div>
                        <div>
                            <label className="text-xs font-black text-gray-500">FLIGHT NO</label>
                            <input type="text" value={formData.flightNo} onChange={e=>handleFlight(e.target.value)} className="w-full p-2 border rounded font-black uppercase" placeholder="BS-"/>
                        </div>
                        <div>
                            <label className="text-xs font-black text-gray-500">STATION</label>
                            <input type="text" value={formData.station} onChange={e=>setVal('station', e.target.value.toUpperCase())} className="w-full p-2 border rounded font-black uppercase" placeholder="STATION"/>
                        </div>
                    </div>
                    
                    <div className="bg-white p-4 rounded-xl shadow border space-y-4">
                        <div>
                            <label className="text-xs font-black text-[#1e3a8a] bg-blue-50 px-2 py-1 rounded inline-block mb-2">TOTAL ULD</label>
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-xs font-black text-gray-500">AKE</label><input type="number" min="0" value={formData.totalAke} onChange={e=>setVal('totalAke', e.target.value)} className="w-full p-2 border rounded font-black text-lg" /></div>
                                <div><label className="text-xs font-black text-gray-500">PMC</label><input type="number" min="0" value={formData.totalPmc} onChange={e=>setVal('totalPmc', e.target.value)} className="w-full p-2 border rounded font-black text-lg" /></div>
                            </div>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div><label className="text-xs font-black text-red-600">DAMAGED MAJOR</label><input type="number" min="0" value={formData.damagedMajor} onChange={e=>setVal('damagedMajor', e.target.value)} className="w-full p-2 border rounded font-black text-lg" /></div>
                            <div><label className="text-xs font-black text-amber-500">DAMAGED MINOR</label><input type="number" min="0" value={formData.damagedMinor} onChange={e=>setVal('damagedMinor', e.target.value)} className="w-full p-2 border rounded font-black text-lg" /></div>
                        </div>
                    </div>

                    <div className="bg-white p-4 rounded-xl shadow border grid grid-cols-2 gap-2">
                        {['lir', 'cpm', 'dmgRpt', 'maintRpt', 'sysUpdate', 'physical'].map(key => (
                            <button key={key} onClick={()=>toggle(key)} className={`p-2 text-sm font-black border rounded transition-colors ${formData.checklists[key] ? 'bg-green-100 text-green-700 border-green-500' : 'bg-gray-50 hover:bg-gray-100'}`}>
                                {key.toUpperCase()} {formData.checklists[key] && '✅'}
                            </button>
                        ))}
                    </div>

                    <div className="bg-white p-4 rounded-xl shadow border">
                        <label className="text-xs font-black text-gray-500">FLIGHT SPECIFIC NOTES</label>
                        <textarea value={formData.notes} onChange={e=>setVal('notes', e.target.value)} className="w-full p-2 border rounded mt-1 h-20 uppercase font-bold" placeholder="TYPE NOTES HERE..."></textarea>
                    </div>

                    <div className="fixed bottom-0 left-0 right-0 p-4 bg-white border-t z-20 print-hidden shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                        <button onClick={save} className="w-full max-w-4xl mx-auto bg-[#1e3a8a] hover:bg-blue-800 text-white py-4 rounded-xl font-black text-lg tracking-widest shadow-md transition">SAVE ENTRY</button>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 7. FINAL REPORT & EXPORT (Fixed A4 Portrait Dimensions & Fonts)
        // ==========================================
        function ReportView({ flights, user, globalData }) {
            const totals = flights.reduce((acc, f) => {
                const uldAke = parseInt(f.totalAke)||0;
                const uldPmc = parseInt(f.totalPmc)||0;
                const maj = parseInt(f.damagedMajor)||0;
                const min = parseInt(f.damagedMinor)||0;
                
                acc.movementAke += uldAke;
                acc.movementPmc += uldPmc;
                acc.totalMovement += (uldAke + uldPmc);
                acc.maj += maj;
                acc.min += min;
                return acc;
            }, { movementAke: 0, movementPmc: 0, totalMovement: 0, maj: 0, min: 0 });

            const dacAke = parseInt(globalData.dacAke)||0;
            const dacPmc = parseInt(globalData.dacPmc)||0;
            const maint = parseInt(globalData.maintenance)||0;

            const totalUldCount = totals.totalMovement;
            const getPct = (val) => totalUldCount === 0 ? '0%' : ((val / totalUldCount) * 100).toFixed(2) + '%';
            
            const today = new Date();
            const dateStr = today.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).replace(/ /g, '-').toUpperCase();

            let allNotes = [];
            if (globalData.globalNotes) {
                globalData.globalNotes.split('\n').filter(n => n.trim() !== '').forEach(n => allNotes.push(n));
            }
            flights.forEach(f => {
                if (f.notes) f.notes.split('\n').filter(n => n.trim() !== '').forEach(n => allNotes.push(`(${f.flightNo}): ${n}`));
            });
            allNotes.push(`TOTAL STOCK ARE AKE-${dacAke} / PMC-${dacPmc}.`);

            const noteIcons = ["alertTriangleSolid", "info", "checkCircleSolid", "pin"];
            const noteColors = ["text-red-500", "text-amber-500", "text-blue-500", "text-green-500"];

            const checklistRows = [
                { sl: '01', label: 'LIR UPLOAD', key: 'lir', type: 'bool' },
                { sl: '02', label: 'CPM / UCM', key: 'cpm', type: 'bool' },
                { sl: '03', label: 'TOTAL ULD COUNT', key: 'uldCount', type: 'calc' },
                { sl: '04', label: 'DAMAGE REPORT', key: 'dmgRpt', type: 'bool' },
                { sl: '05', label: 'MAINTENANCE REPORT', key: 'maintRpt', type: 'bool' },
                { sl: '06', label: 'SYSTEM UPDATE', key: 'sysUpdate', type: 'bool' },
                { sl: '07', label: 'PHYSICAL CHECK (LAST)', key: 'physical', type: 'bool' },
            ];

            // Trigger Download Function (Strict A4 Aspect Ratio)
            const downloadJPG = () => {
                const element = document.getElementById('capture-report');
                html2canvas(element, { scale: 2, useCORS: true, backgroundColor: '#e0f2fe', logging: false }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `USBA-ULD-REPORT-${dateStr}.jpg`;
                    link.href = canvas.toDataURL('image/jpeg', 1.0);
                    link.click();
                });
            };

            // First Name for Signature
            const firstName = user.name.trim().split(' ')[0];
            const signatureName = firstName ? firstName.charAt(0).toUpperCase() + firstName.slice(1).toLowerCase() : '';

            return (
                <div className="w-full overflow-x-auto report-scroll pb-10 print:overflow-visible font-report bg-[#e0f2fe]">
                    {/* Fixed Dimensions for A4 Layout Export: 794px by 1123px */}
                    <div id="capture-report" style={{ width: '794px', minHeight: '1123px', backgroundColor: '#e0f2fe', padding: '30px', margin: '0 auto', display: 'flex', flexDirection: 'column' }} className="shadow-lg border border-sky-200 text-gray-800 font-bold">
                        
                        {/* 1. Header with Logo, Title */}
                        <div className="flex justify-between items-center mb-6 pt-2">
                            <div className="flex items-center gap-2 text-[#1e3a8a] w-1/4">
                                <Icon name="plane" size={32} color="#1e3a8a" />
                                <div className="leading-none mt-1">
                                    <h1 className="text-xl font-black italic tracking-tighter uppercase">US-Bangla</h1>
                                    <p className="text-[10px] font-bold tracking-[0.3em] ml-1 uppercase">Airlines</p>
                                </div>
                            </div>
                            
                            <h2 className="text-3xl font-oswald text-[#1e3a8a] uppercase tracking-wide text-center flex-1">
                                DAILY ULD CHECKLIST REPORT
                            </h2>
                            
                            <div className="w-1/4"></div>
                        </div>

                        {/* 2. USER INFO BAR (3 Columns) */}
                        <div className="flex justify-between border-t border-b border-sky-300 py-3 mb-6 px-4 bg-sky-100/50">
                            <div className="text-center w-1/3 border-r border-sky-300">
                                <p className="text-[10px] text-[#1e3a8a] font-bold mb-1 uppercase tracking-wide">ULD CONTROLLER</p>
                                <p className="flex items-center justify-center gap-1.5 text-sm font-bold text-gray-800">
                                    <Icon name="user" size={14} color="#1e3a8a"/> {user.name}
                                </p>
                            </div>
                            <div className="text-center w-1/3 border-r border-sky-300">
                                <p className="text-[10px] text-[#1e3a8a] font-bold mb-1 uppercase tracking-wide">USBA ID</p>
                                <p className="flex items-center justify-center gap-1.5 text-sm font-bold text-gray-800">
                                    <Icon name="idCard" size={14} color="#1e3a8a"/> {user.id}
                                </p>
                            </div>
                            <div className="text-center w-1/3">
                                <p className="text-[10px] text-[#1e3a8a] font-bold mb-1 uppercase tracking-wide">DATE</p>
                                <p className="flex items-center justify-center gap-1.5 text-sm font-bold text-gray-800">
                                    <Icon name="calendar" size={14} color="#1e3a8a"/> {dateStr}
                                </p>
                            </div>
                        </div>

                        {/* 3. SUMMARY OVERVIEW SECTION (All in ONE line) */}
                        <div className="mb-6">
                            <div className="bg-[#1e3a8a] text-white font-bold text-sm px-4 py-1.5 inline-block rounded-r-lg mb-3 shadow-sm uppercase tracking-wider">SUMMARY OVERVIEW</div>
                            
                            <div className="grid grid-cols-5 gap-3">
                                {/* Box 1: DAC STOCK */}
                                <div className="border-2 border-blue-200 rounded-xl p-2 text-center bg-white shadow-sm flex flex-col justify-between h-28">
                                    <p className="text-[10px] text-[#1e3a8a] font-bold uppercase tracking-wide">DAC STOCK</p>
                                    <div className="flex justify-around w-full mt-2">
                                        <div className="text-center w-1/2">
                                            <span className="text-[10px] text-gray-500 font-bold block mb-0.5">AKE</span>
                                            <span className="text-3xl font-oswald text-[#1e3a8a] font-bold leading-none">{dacAke}</span>
                                        </div>
                                        <div className="text-center w-1/2 border-l border-blue-200">
                                            <span className="text-[10px] text-gray-500 font-bold block mb-0.5">PMC</span>
                                            <span className="text-3xl font-oswald text-[#1e3a8a] font-bold leading-none">{dacPmc}</span>
                                        </div>
                                    </div>
                                    <div className="h-1"></div>
                                </div>
                                
                                {/* Box 2: MOVEMENT */}
                                <div className="border-2 border-green-200 rounded-xl p-2 text-center bg-white shadow-sm flex flex-col justify-between h-28">
                                    <p className="text-[10px] text-green-600 font-bold uppercase tracking-wide">MOVEMENT</p>
                                    <div className="flex justify-around w-full mt-2">
                                        <div className="text-center w-1/2">
                                            <span className="text-[10px] text-gray-500 font-bold block mb-0.5">AKE</span>
                                            <span className="text-3xl font-oswald text-green-600 font-bold leading-none">{totals.movementAke}</span>
                                        </div>
                                        <div className="text-center w-1/2 border-l border-green-200">
                                            <span className="text-[10px] text-gray-500 font-bold block mb-0.5">PMC</span>
                                            <span className="text-3xl font-oswald text-green-600 font-bold leading-none">{totals.movementPmc}</span>
                                        </div>
                                    </div>
                                    <div className="h-1"></div>
                                </div>

                                {/* Box 3: DAMAGED (MAJOR) */}
                                <div className="border-2 border-red-200 rounded-xl p-3 text-center bg-white shadow-sm flex flex-col justify-between h-28">
                                    <p className="text-[10px] text-red-600 font-bold uppercase tracking-wide">DAMAGED (MAJOR)</p>
                                    <div className="flex items-center justify-center gap-2 my-1">
                                        <Icon name="alertTriangleSolid" color="#dc2626" size={28} />
                                        <span className="text-4xl font-oswald text-red-600 font-bold leading-none">{totals.maj}</span>
                                    </div>
                                    <p className="text-[10px] text-gray-600 font-bold">{getPct(totals.maj)}</p>
                                </div>

                                {/* Box 4: DAMAGED (MINOR) */}
                                <div className="border-2 border-orange-200 rounded-xl p-3 text-center bg-white shadow-sm flex flex-col justify-between h-28">
                                    <p className="text-[10px] text-orange-500 font-bold uppercase tracking-wide">DAMAGED (MINOR)</p>
                                    <div className="flex items-center justify-center gap-2 my-1">
                                        <Icon name="alertTriangleSolid" color="#f97316" size={28} />
                                        <span className="text-4xl font-oswald text-orange-500 font-bold leading-none">{totals.min}</span>
                                    </div>
                                    <p className="text-[10px] text-gray-600 font-bold">{getPct(totals.min)}</p>
                                </div>

                                {/* Box 5: UNDER MAINTENANCE */}
                                <div className="border-2 border-blue-200 rounded-xl p-3 text-center bg-white shadow-sm flex flex-col justify-between h-28">
                                    <p className="text-[10px] text-[#2563eb] font-bold uppercase tracking-wide leading-tight">UNDER MAINTENANCE</p>
                                    <div className="flex items-center justify-center gap-2 my-1">
                                        <Icon name="wrench" color="#2563eb" size={24} />
                                        <span className="text-4xl font-oswald text-[#2563eb] font-bold leading-none">{maint}</span>
                                    </div>
                                    <p className="text-[10px] text-gray-600 font-bold">{getPct(maint)}</p>
                                </div>
                            </div>
                        </div>

                        {/* 4. CHECKLIST STATUS TABLE */}
                        <div className="mb-6">
                            <div className="bg-[#1e3a8a] text-white font-bold text-sm px-4 py-1.5 inline-block rounded-r-lg mb-3 shadow-sm uppercase tracking-wider">CHECKLIST STATUS</div>
                            <div className="border-2 border-sky-200 rounded-lg overflow-hidden bg-white">
                                <table className="w-full text-sm text-center border-collapse">
                                    <thead>
                                        <tr className="bg-sky-50 border-b border-sky-200 text-[#1e3a8a] text-[11px] uppercase">
                                            <th className="py-2.5 px-2 font-bold w-12 border-r border-sky-200">SL NO</th>
                                            <th className="py-2.5 px-4 font-bold text-left border-r border-sky-200">JOB DESCRIPTION</th>
                                            {flights.map(f => (
                                                <th key={f.id} className="py-2.5 px-2 font-bold border-r border-sky-200 leading-tight">
                                                    {f.station} <br/><span className="text-[9px] font-bold text-gray-600">({f.flightNo})</span>
                                                </th>
                                            ))}
                                            <th className="py-2.5 px-4 font-bold">REMARKS</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {checklistRows.map((row, idx) => (
                                            <tr key={idx} className="border-b border-sky-100 last:border-0 hover:bg-sky-50/50">
                                                <td className="py-2.5 px-2 font-bold text-[#1e3a8a] border-r border-sky-100">{row.sl}</td>
                                                <td className="py-2.5 px-4 text-left font-bold text-[#1e3a8a] border-r border-sky-100">{row.label}</td>
                                                {flights.map(f => (
                                                    <td key={f.id} className="py-2.5 px-2 border-r border-sky-100 font-bold text-gray-800">
                                                        {row.type === 'bool' ? (
                                                            f.checklists[row.key] ? <div className="flex justify-center"><Icon name="checkCircleSolid" size={16} color="#16a34a" /></div> : '-'
                                                        ) : (
                                                            (parseInt(f.totalAke)||0) + (parseInt(f.totalPmc)||0)
                                                        )}
                                                    </td>
                                                ))}
                                                <td className="py-2.5 px-4 text-gray-800 font-bold text-[11px]">COMPLETED</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* 5. SPECIAL NOTES SECTION */}
                        <div className="mb-6">
                            <div className="bg-[#1e3a8a] text-white font-bold text-sm px-4 py-1.5 inline-block rounded-r-lg mb-3 shadow-sm uppercase tracking-wider">SPECIAL NOTES</div>
                            <div className="border-2 border-sky-200 rounded-lg p-4 bg-white flex items-stretch gap-6">
                                <div className="flex-1 space-y-2.5">
                                    {allNotes.length === 0 ? <p className="text-sm text-gray-600 font-bold">NO SPECIAL REMARKS NOTED FOR THIS SESSION.</p> : 
                                        allNotes.map((note, idx) => {
                                            const iconName = noteIcons[idx % noteIcons.length];
                                            const colorClass = noteColors[idx % noteColors.length];
                                            const hexMap = {"text-red-500":"#ef4444", "text-amber-500":"#f59e0b", "text-blue-500":"#3b82f6", "text-green-500":"#22c55e"};
                                            return (
                                                <div key={idx} className="flex items-start gap-2.5">
                                                    <div className={`mt-[2px] ${colorClass}`}><Icon name={iconName} size={14} color={hexMap[colorClass]} /></div>
                                                    <p className="text-[12px] font-bold text-gray-800 leading-snug font-sans uppercase">{note}</p>
                                                </div>
                                            )
                                        })
                                    }
                                </div>
                            </div>
                        </div>

                        {/* PUSH FOOTER TO BOTTOM (Flex spacer) */}
                        <div className="flex-1"></div>

                        {/* 6. SIGNATURE SECTION */}
                        <div className="mt-4 flex w-full mb-2">
                            <div className="flex flex-col items-start w-1/3">
                                <div className="bg-[#1e3a8a] text-white font-bold text-sm px-4 py-1.5 inline-block rounded-r-lg mb-6 shadow-sm uppercase tracking-wider">VERIFIED BY</div>
                                <div className="flex flex-col items-center w-full px-4">
                                    <div className="font-[cursive] text-2xl text-gray-800 mb-1 transform -rotate-6 tracking-wider opacity-80" style={{fontFamily: "'Brush Script MT', cursive"}}>
                                        {signatureName}
                                    </div>
                                    <div className="w-full border-t-2 border-gray-800"></div>
                                </div>
                            </div>
                        </div>

                    </div>

                    {/* FIXED ACTION BUTTONS (Hidden from JPG & Print) */}
                    <div className="fixed bottom-0 left-0 right-0 flex justify-center gap-4 p-4 bg-white border-t z-20 print-hidden shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                        <button onClick={() => window.print()} className="flex-1 max-w-xs bg-gray-800 hover:bg-gray-900 text-white py-3 rounded-xl shadow-lg font-black flex items-center justify-center gap-2 transition font-sans">
                            <Icon name="print" size={20} color="white" /> PDF REPORT
                        </button>
                        <button onClick={downloadJPG} className="flex-1 max-w-xs bg-[#1e3a8a] hover:bg-blue-800 text-white py-3 rounded-xl shadow-lg font-black flex items-center justify-center gap-2 transition font-sans">
                            <Icon name="download" size={20} color="white" /> DOWNLOAD JPG
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
